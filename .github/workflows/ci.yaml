name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.26'

      - name: Install zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2
        with:
          version: 0.15.2

      - name: Lint
        run: make lint

      - name: Test
        run: make test

      - name: Build Linux
        run: make build-linux

      - name: Verify binaries
        run: |
          echo "=== Linux amd64 ==="
          ls -la bin/charon_linux_amd64 bin/worker_linux_amd64
          echo "=== Linux arm64 ==="
          ls -la bin/charon_linux_arm64 bin/worker_linux_arm64
